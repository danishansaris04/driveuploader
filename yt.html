<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Downloader</title>
    <style>
        :root { --bg-color: #0a0a0a; --card-bg: #141414; --accent-color: #ff0000; --text-color: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1200px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 40px; background: var(--card-bg); padding: 10px; border-radius: 8px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        button { background: var(--accent-color); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; padding-bottom: 10px; }
        .thumbnail { width: 100%; height: 150px; object-fit: cover; }
        .title { padding: 10px; font-size: 14px; height: 40px; overflow: hidden; }
        .btn-dl { display: block; width: 90%; margin: 10px auto; text-align: center; background: #333; padding: 8px; border-radius: 4px; color: #0f0; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Playlist Downloader</h1>
        <div class="search-box">
            <input type="text" id="playlistLink" placeholder="Paste Playlist Link...">
            <button onclick="fetchPlaylist()">Fetch Videos</button>
        </div>
        <div class="video-grid" id="videoGrid"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAL4pD-wKL8GFfX9Na2jRwx7kuQWPdirl0'; // Yahan apni key dalen
        
        function extractPlaylistId(url) {
            const match = url.match(/[&?]list=([^#\&\?]+)/);
            return (match && match[1]) ? match[1] : url;
        }

        async function fetchPlaylist() {
            const id = extractPlaylistId(document.getElementById('playlistLink').value);
            const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${id}&key=${API_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            data.items.forEach(item => {
                const videoId = item.snippet.resourceId.videoId;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <img class="thumbnail" src="${item.snippet.thumbnails.medium.url}">
                    <div class="title">${item.snippet.title}</div>
                    <a class="btn-dl" onclick="downloadVideo('${videoId}')">Download Now</a>
                `;
                grid.appendChild(card);
            });
        }

        // Yeh method 100% kaam karega
        function downloadVideo(videoId) {
            // Hum ek naye tab me downloader khol rahe hain. 
            // Yeh sabse stable tarika hai.
            const url = `https://loader.to/api/button/?url=https://youtube.com/watch?v=${videoId}&f=mp4`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
