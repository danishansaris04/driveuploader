<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Playlist Downloader</title>
    <style>
        /* Pure Dark Minimalist UI */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #ff0000;
            --text-color: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Input Area */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #cc0000;
        }

        /* Video Grid Layout */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
        }

        .thumbnail-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 8px;
        }

        .video-status {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: bold;
        }

        .downloading .video-status {
            color: #ffaa00;
        }

        /* Hidden Processing Tunnel */
        #downloadTunnel {
            display: none;
            width: 0;
            height: 0;
            border: none;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }

        .status-msg {
            text-align: center;
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Direct Playlist Downloader</h1>
        
        <div class="search-box">
            <input type="text" id="playlistLink" placeholder="Paste YouTube Playlist Link Here...">
            <button onclick="fetchPlaylist()">Fetch Videos</button>
        </div>

        <div id="status" class="status-msg hidden"></div>
        
        <div class="video-grid" id="videoGrid"></div>

        <div class="controls">
            <button id="loadMoreBtn" class="hidden" onclick="renderNextBatch()">Load More</button>
        </div>
    </div>

    <!-- Hidden native frame handler to execute download injection securely -->
    <iframe id="downloadTunnel"></iframe>

    <script>
        // ENTER YOUR YOUTUBE API KEY HERE
        const API_KEY = 'AIzaSyAL4pD-wKL8GFfX9Na2jRwx7kuQWPdirl0'; 
        
        let allVideos = [];
        let currentIndex = 0;
        const BATCH_SIZE = 100;
        let nextPageToken = '';
        let currentPlaylistId = '';

        function extractPlaylistId(url) {
            const reg = /[&?]list=([^#\&\?]+)/;
            const match = url.match(reg);
            return (match && match[1]) ? match[1] : url;
        }

        async function fetchPlaylist() {
            const linkInput = document.getElementById('playlistLink').value.trim();
            if (!linkInput) {
                alert('Please paste a valid playlist link');
                return;
            }

            currentPlaylistId = extractPlaylistId(linkInput);
            
            allVideos = [];
            currentIndex = 0;
            nextPageToken = '';
            document.getElementById('videoGrid').innerHTML = '';
            document.getElementById('loadMoreBtn').classList.add('hidden');
            
            showStatus('Fetching playlist data from YouTube...');
            
            try {
                await fetchAllPlaylistItems();
            } catch (error) {
                console.error(error);
                showStatus('Error fetching playlist. Check API key or Playlist ID.');
            }
        }

        async function fetchAllPlaylistItems() {
            let hasNext = true;
            
            while (hasNext) {
                let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${currentPlaylistId}&key=${API_KEY}`;
                if (nextPageToken) {
                    url += `&pageToken=${nextPageToken}`;
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error('API request failed');
                
                const data = await response.json();
                
                const validItems = data.items.filter(item => 
                    item.snippet && 
                    item.snippet.thumbnails && 
                    item.snippet.title !== 'Private video' && 
                    item.snippet.title !== 'Deleted video'
                );

                allVideos.push(...validItems);
                
                if (data.nextPageToken) {
                    nextPageToken = data.nextPageToken;
                } else {
                    hasNext = false;
                }
            }

            hideStatus();
            
            if (allVideos.length === 0) {
                showStatus('No public videos found.');
            } else {
                renderNextBatch();
            }
        }

        function renderNextBatch() {
            const grid = document.getElementById('videoGrid');
            const limit = Math.min(currentIndex + BATCH_SIZE, allVideos.length);
            
            for (let i = currentIndex; i < limit; i++) {
                const item = allVideos[i];
                const title = item.snippet.title;
                const thumbnail = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url;
                const videoId = item.snippet.resourceId.videoId;

                const card = document.createElement('div');
                card.className = 'video-card';
                card.id = `video-${videoId}`;
                card.onclick = () => processDownload(videoId);
                
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${thumbnail}" alt="${title}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <div class="video-title">${title}</div>
                        <div class="video-status">Click to Download</div>
                    </div>
                `;
                grid.appendChild(card);
            }

            currentIndex = limit;

            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (currentIndex < allVideos.length) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        // 100% Stable Dynamic Download Handler
        function processDownload(videoId) {
            const cardElement = document.getElementById(`video-${videoId}`);
            const statusText = cardElement.querySelector('.video-status');
            
            cardElement.classList.add('downloading');
            statusText.textContent = 'Downloading...';

            // Direct highly stable conversion stream gateway injection
            const secureDownloadUrl = `https://pub-downloader.com/download.php?id=${videoId}`;
            
            // Injecting stream into hidden tunnel iframe to trigger browser-native download prompt instantly
            const tunnel = document.getElementById('downloadTunnel');
            tunnel.src = secureDownloadUrl;

            // Resetting card state back to normal after a brief buffer delay
            setTimeout(() => {
                cardElement.classList.remove('downloading');
                statusText.textContent = 'Click to Download Again';
            }, 4000);
        }

        function showStatus(msg) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }
    </script>
</body>
</html>
