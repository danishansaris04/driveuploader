<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Playlist Extractor & Downloader</title>
    
    <!-- Bootstrap 5.3 & Icons (As per your provided source layout) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Pure OLED Black Dashboard */
        :root {
            --bg-color: #000000;
            --card-bg: #090909;
            --accent-color: #ff0000;
            --text-color: #e5e5e5;
            --border-color: #161616;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 10px;
            min-height: 100vh;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            background: #0c0c0c;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px;
            outline: none;
        }

        .search-box button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* Video Responsive Layout */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-4px);
        }

        .thumb-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        .thumb-box img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            max-height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #fff;
            margin-bottom: 8px;
        }

        .action-btn {
            background: #111;
            color: #00ff66;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #004d1f;
        }

        /* Modal/Engine Frame Adjustments */
        .engine-frame {
            width: 100%;
            height: 480px;
            border: none;
            background: #000;
            border-radius: 8px;
        }

        .hidden { display: none !important; }
        
        .status-log {
            text-align: center;
            color: #888;
            margin: 20px 0;
        }

        .load-more-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-center fw-bold mb-4"><span style="color:var(--accent-color)">GenYouTube</span> Custom Playlist Client</h2>
        
        <!-- Link Input Bar -->
        <div class="search-box">
            <input type="text" id="playlistUrl" placeholder="Paste YouTube Playlist Link here...">
            <button onclick="initializeFetch()">Extract Videos</button>
        </div>

        <div id="statusAlert" class="status-log hidden"></div>
        
        <!-- Video Rendering Grid -->
        <div class="video-grid" id="mainGrid"></div>

        <!-- Pagination (100 video limit standard check) -->
        <div class="load-more-container">
            <button id="btnLoadMore" class="btn btn-danger hidden" onclick="renderVideoBatch()">Load More</button>
        </div>
    </div>

    <!-- Download Engine Modal Control (Keeps processing within your domain hub) -->
    <div class="modal fade" id="downloadProcessModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary justify-content-between">
                    <h5 class="modal-title" id="modalVideoTitle">Select Format & Quality</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <!-- Embedded GenYouTube conversion core tunnel inside your layout layer -->
                    <iframe id="engineTunnel" class="engine-frame"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Engines -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ENTER YOUR GOOGLE YOUTUBE DATA API V3 KEY HERE
        const CORE_API_KEY = 'AIzaSyAL4pD-wKL8GFfX9Na2jRwx7kuQWPdirl0'; 

        let datasetContainer = [];
        let globalPointer = 0;
        const BATCH_LIMIT = 100;
        let tokenTracker = '';
        let extractedPlaylistId = '';

        function extractId(url) {
            const regex = /[&?]list=([^#\&\?]+)/;
            const match = url.match(regex);
            return (match && match[1]) ? match[1] : url;
        }

        async function initializeFetch() {
            const inputVal = document.getElementById('playlistUrl').value.trim();
            if (!inputVal) {
                alert('Please input a valid URL payload first.');
                return;
            }

            extractedPlaylistId = extractId(inputVal);
            
            // Clean dynamic components
            datasetContainer = [];
            globalPointer = 0;
            tokenTracker = '';
            document.getElementById('mainGrid').innerHTML = '';
            document.getElementById('btnLoadMore').classList.add('hidden');
            
            toggleStatusLog('Accessing YouTube structural pathways...');
            
            try {
                await executeDeepExtraction();
            } catch (err) {
                console.error(err);
                toggleStatusLog('Network extraction halted. Check API key configurations.');
            }
        }

        async function executeDeepExtraction() {
            let activeLoop = true;
            
            while (activeLoop) {
                let proxyUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${extractedPlaylistId}&key=${CORE_API_KEY}`;
                if (tokenTracker) {
                    proxyUrl += `&pageToken=${tokenTracker}`;
                }

                const networkResponse = await fetch(proxyUrl);
                if (!networkResponse.ok) throw new Error('API processing error');
                
                const responseData = await networkResponse.json();
                
                const sanitizedItems = responseData.items.filter(node => 
                    node.snippet && 
                    node.snippet.thumbnails && 
                    node.snippet.title !== 'Private video' && 
                    node.snippet.title !== 'Deleted video'
                );

                datasetContainer.push(...sanitizedItems);
                
                if (responseData.nextPageToken) {
                    tokenTracker = responseData.nextPageToken;
                } else {
                    activeLoop = false;
                }
            }

            toggleStatusLog('');
            
            if (datasetContainer.length === 0) {
                toggleStatusLog('No translatable media items parsed.');
            } else {
                renderVideoBatch();
            }
        }

        function renderVideoBatch() {
            const targetGrid = document.getElementById('mainGrid');
            const ceiling = Math.min(globalPointer + BATCH_LIMIT, datasetContainer.length);
            
            for (let index = globalPointer; index < ceiling; index++) {
                const nodeItem = datasetContainer[index];
                const metaTitle = nodeItem.snippet.title;
                const imgThumb = nodeItem.snippet.thumbnails.medium ? nodeItem.snippet.thumbnails.medium.url : nodeItem.snippet.thumbnails.default.url;
                const nativeVideoId = nodeItem.snippet.resourceId.videoId;

                const wrapperCard = document.createElement('div');
                wrapperCard.className = 'video-card';
                // Trigger internal modal download processing execution layer
                wrapperCard.onclick = () => activateDownloadEngine(nativeVideoId, metaTitle);
                
                wrapperCard.innerHTML = `
                    <div class="thumb-box">
                        <img src="${imgThumb}" alt="${metaTitle}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <div class="video-title">${metaTitle}</div>
                        <div class="action-btn"><i class="bi bi-download"></i> Options & Download</div>
                    </div>
                `;
                targetGrid.appendChild(wrapperCard);
            }

            globalPointer = ceiling;

            const moreBtn = document.getElementById('btnLoadMore');
            if (globalPointer < datasetContainer.length) {
                moreBtn.classList.remove('hidden');
            } else {
                moreBtn.classList.add('hidden');
            }
        }

        // GenYouTube engine interface mapping
        function activateDownloadEngine(videoId, title) {
            document.getElementById('modalVideoTitle').textContent = title;
            
            // Setting target destination pointing to GenYouTube watch engine sequence parameters
            const dynamicEngineUrl = `https://genyoutube.online/en1/url=https://www.youtube.com/watch?v=${videoId}`;
            
            // Assigning source inside the modal frame container natively
            const frameRef = document.getElementById('engineTunnel');
            frameRef.src = dynamicEngineUrl;

            // Instantiating standard Bootstrap Modal controller interface sequence 
            const processingModal = new bootstrap.Modal(document.getElementById('downloadProcessModal'));
            processingModal.show();
        }

        function toggleStatusLog(msg) {
            const container = document.getElementById('statusAlert');
            if(msg) {
                container.textContent = msg;
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
